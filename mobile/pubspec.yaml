name: lejdoces
description: Flutter authentication app with email, password and Google OAuth.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter

  # HTTP and API
  http: ^1.1.0
  dio: ^5.9.2

  # Firebase (para Google Auth no web)
  firebase_core: ^4.6.0
  firebase_auth: ^6.0.0

  # State management
  provider: ^6.0.0
  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0

  # Local storage
  shared_preferences: ^2.2.0
  hive: ^2.2.0
  hive_flutter: ^1.1.0

  # Google Auth
  google_sign_in: ^6.1.0

  # UI
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0

  # Validators
  email_validator: ^2.1.0

  # Navigation
  go_router: ^11.0.0

  # Environment
  flutter_dotenv: ^5.1.0
  image_picker: ^1.2.1
  http_parser: ^4.1.2

  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  hive_generator: ^2.0.0
  build_runner: ^2.4.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7
  flutter_svg: ^1.1.0

flutter:
  uses-material-design: true

  assets:
    - lib/assets/images/
    - .env
    - .env.example

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/app_icon.png"

flutter_native_splash:
  color: "#FFFFFF"
  image: "assets/splash/app_splash_padded.png"
  image_dark: "assets/splash/app_splash_padded.png"
  fullscreen: true
  android_12:
    image: "assets/splash/app_splash_padded.png"
    image_dark: "assets/splash/app_splash_padded.png"
    icon_background_color: "#FFFFFF"
